<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>👡 Tung Dép Website</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        background: url("./img/abbbbb·3.jpg") center/cover no-repeat;
        overflow: hidden;
      }
      #game {
        width: 360px;
        height: 620px;
        background: rgba(0, 0, 0, 0.6);
        border: 4px solid white;
        border-radius: 20px;
        position: relative;
        backdrop-filter: blur(5px);
      }
      .box {
        width: 110px;
        height: 75px;
        background: #444;
        border: 2px solid white;
        border-radius: 15px;
        position: absolute;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 14px;
        transition: 0.2s;
      }
      .box img {
        width: 35px;
        height: 35px;
        margin-bottom: 5px;
      }
      .active {
        background: orange;
        transform: scale(1.1);
      }
      #slipper {
        width: 28px;
        height: 28px;
        background: orange;
        border-radius: 8px;
        position: absolute;
        display: none;
      }
      button {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 20px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      #title {
        text-align: center;
        color: white;
        margin-top: 10px;
        font-size: 28px;
        text-shadow: 2px 2px 5px black;
      }
    </style>
  </head>
  <body>
    <!-- NHẠC NỀN ẨN -->
    <audio id="bgm" autoplay loop hidden preload="auto">
      <source src="./Music/nhacboc.mp3" type="audio/mp3" />
    </audio>

    <div>
      <div id="title">👡 Tung Dép Website</div>
      <div id="game">
        <div class="box" id="b1" style="left: 20px; top: 470px">
          <img
            src="https://cdn-icons-png.flaticon.com/512/300/300221.png"
          />Google
        </div>
        <div class="box" id="b2" style="right: 20px; top: 470px">
          <img
            src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"
          />YouTube
        </div>
        <div class="box" id="b3" style="left: 125px; top: 370px">
          <img
            src="https://cdn-icons-png.flaticon.com/512/733/733547.png"
          />Facebook
        </div>
        <div class="box" id="b4" style="left: 70px; top: 270px; width: 220px">
          <img
            src="https://cdn-icons-png.flaticon.com/512/5968/5968852.png"
          />Wikipedia
        </div>
        <div class="box" id="b5" style="left: 125px; top: 170px">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg"
          />ChatGPT
        </div>
        <div class="box" id="b6" style="left: 20px; top: 70px">
          <img
            src="https://cdn-icons-png.flaticon.com/512/733/733553.png"
          />GitHub
        </div>
        <div class="box" id="b7" style="right: 20px; top: 70px">
          <img
            src="https://cdn-icons-png.flaticon.com/512/3670/3670382.png"
          />Steam
        </div>
        <div id="slipper"></div>
        <button onclick="throwSlipper()">👡 Tung Dép</button>
      </div>
    </div>

    <script>
      const web = {
        1: "https://google.com",
        2: "https://youtube.com",
        3: "https://facebook.com",
        4: "https://wikipedia.org",
        5: "https://chatgpt.com",
        6: "https://github.com",
        7: "https://store.steampowered.com",
      };
      const pos = {
        1: [55, 495],
        2: [255, 495],
        3: [160, 395],
        4: [160, 295],
        5: [160, 195],
        6: [55, 95],
        7: [255, 95],
      };
      const slipper = document.getElementById("slipper");

      function throwSlipper() {
        let n = Math.floor(Math.random() * 7) + 1;
        document
          .querySelectorAll(".box")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("b" + n).classList.add("active");
        slipper.style.display = "block";
        slipper.style.left = pos[n][0] + "px";
        slipper.style.top = pos[n][1] + "px";
        window.open(web[n], "_blank");
      }

      // Fallback: nếu autoplay bị chặn, phát nhạc khi người dùng click
      document.addEventListener("click", () => {
        const audio = document.getElementById("bgm");
        if (audio.paused) audio.play();
      });
    </script>
  </body>
</html>
